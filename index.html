<!-- =========================================================
     1. SCRIPT UI DASAR & ANTI-STUCK (TIDAK BERGANTUNG FIREBASE)
     ========================================================= -->
<script>
    // Fungsi ini dijamin akan selalu jalan untuk mengubah form Login <-> Daftar
    window.toggleAuthMode = function(mode) {
        if (mode === 'register') {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('registerPanel').style.display = 'block';
        } else {
            document.getElementById('registerPanel').style.display = 'none';
            document.getElementById('loginPanel').style.display = 'block';
        }
    };

    // Fungsi sementara JIKA Firebase diblokir atau gagal dimuat
    window.doLogin = function() {
        const errorMsg = document.getElementById('loginError');
        errorMsg.innerText = "Gagal memuat sistem keamanan (Firebase). Pastikan koneksi internet Anda stabil dan jaringan Anda tidak memblokir akses ke layanan Google.";
        errorMsg.style.display = 'block';
    };

    window.doRegister = function() {
        alert("Sistem Pendaftaran belum siap karena Firebase gagal terhubung. Cek koneksi Anda.");
    };

    window.doForgotPassword = function() {
        alert("Sistem Reset Sandi belum siap karena Firebase gagal terhubung. Cek koneksi Anda.");
    };

    window.doLogout = function() {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('userName');
        location.reload(); // Paksa muat ulang halaman
    };
</script>

<!-- =========================================================
     2. SCRIPT FIREBASE UTAMA (AKAN MENIMPA SCRIPT DI ATAS JIKA SUKSES)
     ========================================================= -->
<script type="module">
  try {
      import { initializeApp } from "https://www-d-gstatic-d-com-s-gmn.pixivcn.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www-d-gstatic-d-com-s-gmn.pixivcn.com/firebasejs/10.8.0/firebase-auth.js";
      import { getDatabase, ref, set, get, child, onValue, onDisconnect, remove } from "https://www-d-gstatic-d-com-s-gmn.pixivcn.com/firebasejs/10.8.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDNXL53D7Jxw9bDEV1STmQwLthzzM2IcQ8",
        authDomain: "project-sim-40.firebaseapp.com",
        databaseURL: "https://project-sim-40-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "project-sim-40",
        storageBucket: "project-sim-40.firebasestorage.app",
        messagingSenderId: "340860813353",
        appId: "1:340860813353:web:92b5893a67abc1eab1dc38"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getDatabase(app);

      window.db = db;
      window.firebaseRef = ref;
      window.firebaseSet = set;
      window.firebaseOnValue = onValue;
      window.firebaseRemove = remove;
      window.currentUser = null;

      // JIKA FIREBASE SUKSES DIMUAT, KITA TIMPA FUNGSI LOGIN DENGAN VERSI ASLINYA
      window.doLogin = function() {
          const email = document.getElementById('loginEmail').value.trim();
          const password = document.getElementById('loginPassword').value;
          const errorMsg = document.getElementById('loginError');
          const loginBtn = document.querySelector('#loginPanel .auth-btn');

          if (!email || !password) {
              errorMsg.innerText = "Email dan Password wajib diisi!";
              errorMsg.style.display = 'block';
              return;
          }
          
          errorMsg.style.display = 'none';
          loginBtn.innerText = "MENGOTENTIKASI..."; 

          signInWithEmailAndPassword(auth, email, password)
              .then((userCredential) => {
                  localStorage.setItem('isLoggedIn', 'true');
                  localStorage.setItem('userName', email);
                  loginBtn.innerText = "MASUK";
              })
              .catch((error) => {
                  errorMsg.innerText = "Gagal login: Pastikan email & sandi benar. (" + error.message + ")";
                  errorMsg.style.display = 'block';
                  loginBtn.innerText = "MASUK";
              });
      };

      window.doRegister = function() {
          const name = document.getElementById('registerName').value.trim();
          const email = document.getElementById('registerEmail').value.trim();
          const pass = document.getElementById('registerPassword').value;
          const errorMsg = document.getElementById('registerError');
          const regBtn = document.querySelector('#registerPanel .auth-btn');

          if (!name || !email || !pass) { errorMsg.innerText = "Semua kolom wajib diisi!"; errorMsg.style.display = 'block'; return; }
          if (pass.length < 6) { errorMsg.innerText = "Password minimal 6 karakter!"; errorMsg.style.display = 'block'; return; }
          
          errorMsg.style.display = 'none';
          regBtn.innerText = "MEMPROSES...";

          const masterDeveloperEmail = "admin@tirtateknosys.com"; 
          const autoApprove = (email.toLowerCase() === masterDeveloperEmail.toLowerCase());

          createUserWithEmailAndPassword(auth, email, pass)
              .then((userCredential) => {
                  const user = userCredential.user;
                  updateProfile(user, { displayName: name });
                  return set(ref(db, 'users_approval/' + user.uid), {
                      name: name, email: email, isApproved: autoApprove 
                  });
              })
              .then(() => {
                  regBtn.innerText = "DAFTAR SEKARANG";
                  if (autoApprove) {
                      alert("Pendaftaran Developer berhasil! Akun Anda langsung aktif.");
                  } else {
                      alert("Pendaftaran berhasil! Akun Anda sedang menunggu PERSETUJUAN ADMIN.");
                      signOut(auth); 
                      window.toggleAuthMode('login');
                  }
              })
              .catch((error) => {
                  regBtn.innerText = "DAFTAR SEKARANG";
                  if (error.code === 'auth/email-already-in-use') errorMsg.innerText = "Email ini sudah terdaftar. Silakan login.";
                  else errorMsg.innerText = "Gagal mendaftar: " + error.message;
                  errorMsg.style.display = 'block';
              });
      };

      window.doForgotPassword = function() {
          const email = document.getElementById('loginEmail').value.trim();
          const errorMsg = document.getElementById('loginError');
          const successMsg = document.getElementById('loginSuccess');

          if (!email) { 
              errorMsg.innerText = "Silakan ketik email Anda terlebih dahulu pada kolom email di atas!"; 
              errorMsg.style.display = 'block'; 
              successMsg.style.display = 'none';
              return; 
          }
          errorMsg.style.display = 'none';

          sendPasswordResetEmail(auth, email)
              .then(() => {
                  successMsg.innerText = "✅ Link pemulihan sandi telah dikirim ke email Anda.";
                  successMsg.style.display = 'block';
              })
              .catch((error) => {
                  errorMsg.innerText = "Gagal mengirim email reset: " + error.message;
                  errorMsg.style.display = 'block';
                  successMsg.style.display = 'none';
              });
      };

      window.doLogout = function() {
          signOut(auth).then(() => {
              localStorage.removeItem('isLoggedIn');
              localStorage.removeItem('userName');
              location.reload();
          }).catch((error) => alert("Gagal logout: " + error.message));
      };

      onAuthStateChanged(auth, (user) => {
          const nameDisplay = document.getElementById('userNameDisplay');

          if (user) {
              get(child(ref(db), `users_approval/${user.uid}/isApproved`)).then((snapshot) => {
                  if (!snapshot.exists() || snapshot.val() === true) {
                      window.currentUser = user;
                      document.documentElement.classList.remove('sesi-kosong');
                      document.documentElement.classList.add('sesi-aktif');
                      
                      let displayName = user.displayName || user.email.split('@')[0];
                      if(nameDisplay) nameDisplay.innerHTML = `👤 <b>${displayName}</b>`;
                      managePresence(user); 
                  } else {
                      alert("⚠️ AKSES DITOLAK: Akun Anda belum disetujui (Approved) oleh Admin.");
                      signOut(auth);
                  }
              }).catch((error) => {
                  console.error("Rules Firebase dikunci, bypass untuk testing: ", error);
                  window.currentUser = user;
                  document.documentElement.classList.remove('sesi-kosong');
                  document.documentElement.classList.add('sesi-aktif');
                  let displayName = user.displayName || user.email.split('@')[0];
                  if(nameDisplay) nameDisplay.innerHTML = `👤 <b>${displayName}</b>`;
              });
          } else {
              window.currentUser = null;
              document.documentElement.classList.remove('sesi-aktif');
              document.documentElement.classList.add('sesi-kosong');
          }
      });

      function managePresence(user) {
          const userStatusRef = ref(db, '/status/' + user.uid);
          let displayName = user.displayName || user.email.split('@')[0];
          
          const isOfflineForDatabase = { state: 'offline', last_changed: new Date().getTime(), name: displayName, email: user.email };
          const isOnlineForDatabase = { state: 'online', last_changed: new Date().getTime(), name: displayName, email: user.email };

          const connectedRef = ref(db, '.info/connected');
          onValue(connectedRef, (snap) => {
              if (snap.val() === true) {
                  onDisconnect(userStatusRef).set(isOfflineForDatabase).then(() => {
                      set(userStatusRef, isOnlineForDatabase);
                  });
              }
          });
      }

  } catch (error) {
      console.error("Gagal mengeksekusi modul Firebase:", error);
  }
</script>
